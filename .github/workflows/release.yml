name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kings-path-${{ github.ref_name }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Kings Path ${{ github.ref_name }}
          body: |
            ## Instalação Android
            1. Baixe o `app-release.apk`
            2. Transfira para o celular (USB ou Google Drive)
            3. Abra o arquivo no Android e permita "fontes desconhecidas"

  build-linux:
    name: Linux Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Pack Linux bundle
        run: |
          cd build/linux/x64/release
          tar -czf kings-path-linux.tar.gz bundle/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: kings-path-${{ github.ref_name }}-linux
          path: build/linux/x64/release/kings-path-linux.tar.gz

      - name: Attach Linux bundle to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/linux/x64/release/kings-path-linux.tar.gz
          name: Kings Path ${{ github.ref_name }}
